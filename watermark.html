<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Watermark Tool</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; background: #1a202c; color: #1a202c; text-align: center; }
canvas { border: 2px solid #1b5e20; margin: 20px auto; max-width: 100%; display: block; }
.controls { margin: 20px 0; }
button { padding: 12px 24px; background: #1b5e20; color: #1a202c; border: none; cursor: pointer; font-size: 14px; margin: 5px; border-radius: 4px; }
button:hover { background: #2e7d32; }
.info { color: #1b5e20; font-size: 12px; margin: 10px 0; }
</style>
</head>
<body>
<h1>Image Watermark Tool</h1>
<div class="controls">
<button onclick="generate()">Generate Watermarked Image</button>
<button onclick="download()">Download</button>
</div><div class="info">
Original: C:\Users\DELL\Desktop\photo_2023-03-13_23-43-19.jpg | Logo: C:\Users\DELL\Desktop\files\东渐 LOGO.jpg
</div><canvas id="canvas"></canvas>
<script>
function generate() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const imgSize = 600;
    const headerHeight = 70;
    const footerHeight = 60;
    const borderWidth = 8;
    const canvasWidth = imgSize + borderWidth * 2;
    const canvasHeight = imgSize + headerHeight + footerHeight + borderWidth * 2;

    canvas.width = canvasWidth;
    canvas.height = canvasHeight;

    // Outer frame
    ctx.strokeStyle = '#1b5e20';
    ctx.lineWidth = borderWidth;
    ctx.strokeRect(0, 0, canvasWidth, canvasHeight);

    // Header background
    ctx.fillStyle = '#1a202cfff';
    ctx.fillRect(borderWidth, borderWidth, canvasWidth - borderWidth * 2, headerHeight);

    // Header - Website (left)
    ctx.fillStyle = '#1b5e20';
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('Website: www.boppfilmsale.com', borderWidth + 15, borderWidth + 22);

    // Header - Email (left)
    ctx.fillStyle = '#1b5e20';
    ctx.font = '11px Arial';
    ctx.fillText('Email: sale@boppfilmsale.com', borderWidth + 15, borderWidth + 40);

    // Header - Title (center)
    ctx.fillStyle = '#1b5e20';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('AEC GROUP', canvasWidth / 2, borderHeight + 30);

    // Footer background
    ctx.fillStyle = '#1a202cfff';
    ctx.fillRect(borderWidth, headerHeight + borderWidth + imgSize, canvasWidth - borderWidth * 2, footerHeight);

    // Footer text
    ctx.fillStyle = '#1b5e20';
    ctx.font = '9px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Address: No.1158, Huizhou Ave., Bache Dist., 230051, Hefei, Anhui, China', canvasWidth / 2, headerHeight + borderWidth + imgSize + 18);
    ctx.fillText('Tel: +86-551-64687285/18919659471 | Email: sale@boppfilmsale.com', canvasWidth / 2, headerHeight + borderWidth + imgSize + 32);

    // Load and draw main image
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
        ctx.drawImage(img, borderWidth + 4, headerHeight + borderWidth + 4, imgSize - 8, imgSize - 8);

        // Diagonal watermark
        ctx.save();
        ctx.translate(canvasWidth / 2, headerHeight + borderWidth + imgSize / 2);
        ctx.rotate(-Math.PI / 4);
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = '#1b5e20';
        ctx.font = 'bold 28px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('AEC Group', 0, -15);
        ctx.font = '15px Arial';
        ctx.fillText('Website: www.boppfilmsale.com', 0, 15);
        ctx.fillText('Wechat/Whatsapp: 18919659471', 0, 40);
        ctx.restore();

        // Logo in header-right
        const logo = new Image();
        logo.crossOrigin = 'anonymous';
        logo.onload = function() {
            const logoHeight = 36;
            const logoWidth = logo.width * (logoHeight / logo.height);
            ctx.drawImage(logo, canvasWidth - borderWidth - logoWidth - 15, borderWidth + 12, logoWidth, logoHeight);
        };
        logo.src = 'C:/Users/DELL/Desktop/files/东渐 LOGO.jpg';
    };
    img.src = 'C:/Users/DELL/Desktop/photo_2023-03-13_23-43-19.jpg';
}

function download() {
    const canvas = document.getElementById('canvas');
    const link = document.createElement('a');
    link.download = 'watermarked_image.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.9);
    link.click();
}

window.onload = generate;
</script>
</body>
</html>
